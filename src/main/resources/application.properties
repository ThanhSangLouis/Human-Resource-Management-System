spring.application.name=HRMSystem

# MySQL cloud configuration
spring.datasource.url=${DB_URL:jdbc:mysql://mysql-f19a296-khangminhvu97-08cd.a.aivencloud.com:27643/hrm_db?sslMode=REQUIRED&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
security.jwt.secret=${JWT_SECRET:change-me-to-at-least-32-characters-secret-key-for-dev}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.refresh-token.max-age-seconds=${REFRESH_TOKEN_MAX_AGE_SECONDS:604800}
security.refresh-token.secure=${REFRESH_TOKEN_SECURE:false}
