<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM Login</title>
    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #1e293b;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #dc2626;
            --ok: #16a34a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background: radial-gradient(1000px 600px at 10% 0%, var(--bg2), var(--bg1));
            color: var(--text);
            padding: 16px;
        }
        .wrap {
            width: min(420px, 96vw);
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 20px 45px rgba(2, 6, 23, 0.35);
            padding: 26px;
        }
        h1 {
            margin: 0 0 6px;
            font-size: 28px;
        }
        .subtitle {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #374151;
        }
        .field { margin-bottom: 14px; }
        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
        }
        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 11px 14px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background .2s, transform .1s;
        }
        button:hover { background: var(--primary-hover); }
        button:active { transform: translateY(1px); }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .remember-row input[type=checkbox] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
            border: none;
            box-shadow: none;
        }
        .remember-row label {
            margin: 0;
            font-size: 13.5px;
            color: var(--muted);
            cursor: pointer;
            user-select: none;
        }
        .pw-wrap { position: relative; }
        .pw-toggle {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            width: auto;
            padding: 4px;
            cursor: pointer;
            color: var(--muted);
            display: flex;
            align-items: center;
        }
        .pw-toggle:hover { color: var(--primary); background: none; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>HRM Login</h1>
    <p class="subtitle">Chào mừng trở lại! Vui lòng đăng nhập để tiếp tục.</p>

    <div class="field">
        <label for="username">Tên đăng nhập</label>
        <input id="username" autocomplete="username" placeholder="Nhập tên đăng nhập">
    </div>
    <div class="field">
        <label for="password">Mật khẩu</label>
        <div class="pw-wrap">
            <input id="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu">
            <button type="button" id="btnShowPw" class="pw-toggle" title="Hiện/ẩn mật khẩu">
                <svg id="eye-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="remember-row">
      <input type="checkbox" id="rememberMe" />
      <label for="rememberMe">Ghi nhớ đăng nhập</label>
    </div>

    <button id="btnLogin">Đăng nhập</button>
</div>

<script>
    // ── Storage keys ──────────────────────────────────────────────────────────
    const TOKEN_KEY      = 'hrm_access_token';
    const USER_KEY       = 'hrm_user';
    const REFRESH_KEY    = 'hrm_refresh_token';
    const REMEMBER_FLAG  = 'hrm_remember';       // 'true' if user chose to persist
    const REMEMBER_USER  = 'hrm_remember_user';  // saved username

    // ── Elements ──────────────────────────────────────────────────────────────
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const btnLogin   = document.getElementById('btnLogin');
    const rememberMe = document.getElementById('rememberMe');
    const btnShowPw  = document.getElementById('btnShowPw');

    // ── Restore state on page load ────────────────────────────────────────────
    // If user was already logged in (has token) and chose remember → skip login
    const persistedToken = localStorage.getItem(TOKEN_KEY) ||
                           sessionStorage.getItem(TOKEN_KEY);
    if (persistedToken) {
        window.location.replace('/overview');
    }

    // Restore remembered username
    const savedUser = localStorage.getItem(REMEMBER_USER);
    if (savedUser) {
        usernameEl.value = savedUser;
        rememberMe.checked = true;
        passwordEl.focus();
    } else {
        usernameEl.focus();
    }

    // ── Password show/hide ────────────────────────────────────────────────────
    btnShowPw.addEventListener('click', function () {
        const isHidden = passwordEl.type === 'password';
        passwordEl.type = isHidden ? 'text' : 'password';
        btnShowPw.style.color = isHidden ? 'var(--primary)' : '';
    });

    // ── Login ─────────────────────────────────────────────────────────────────
    async function parseJsonSafe(response) {
        const raw = await response.text();
        if (!raw) return {};
        try { return JSON.parse(raw); } catch (e) { return { raw }; }
    }

    btnLogin.addEventListener('click', async () => {
        btnLogin.disabled = true;
        btnLogin.textContent = 'Đang đăng nhập...';
        clearError();
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    username: usernameEl.value.trim(),
                    password: passwordEl.value
                })
            });
            const data = await parseJsonSafe(res);

            if (!res.ok) {
                showError('Sai tên đăng nhập hoặc mật khẩu.');
                passwordEl.value = '';
                passwordEl.focus();
                return;
            }

            const token = data.accessToken || data.access_token || '';
            if (!token) {
                showError('Đăng nhập thất bại: không nhận được token.');
                return;
            }

            // ── Persist strategy based on "remember me" tick ──────────────────
            const remember = rememberMe.checked;
            const storage  = remember ? localStorage : sessionStorage;
            const other    = remember ? sessionStorage : localStorage;

            // Clear from the other storage to avoid conflicts
            other.removeItem(TOKEN_KEY);
            other.removeItem(USER_KEY);
            other.removeItem(REFRESH_KEY);

            const roleNorm = String(data.role || '').trim().toUpperCase();
            const userObj  = JSON.stringify({
                username:   data.username,
                role:       roleNorm || data.role,
                employeeId: data.employeeId != null ? data.employeeId : data.employee_id
            });

            storage.setItem(TOKEN_KEY,   token);
            storage.setItem(USER_KEY,    userObj);
            storage.setItem(REFRESH_KEY, data.refreshToken || data.refresh_token || '');

            // Save or clear username for next visit
            if (remember) {
                localStorage.setItem(REMEMBER_USER, usernameEl.value.trim());
                localStorage.setItem(REMEMBER_FLAG, 'true');
            } else {
                localStorage.removeItem(REMEMBER_USER);
                localStorage.removeItem(REMEMBER_FLAG);
            }

            window.location.replace('/overview');

        } catch (err) {
            showError('Lỗi kết nối, vui lòng thử lại.');
        } finally {
            btnLogin.disabled = false;
            btnLogin.textContent = 'Đăng nhập';
        }
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function showError(msg) {
        clearError();
        const el = document.createElement('p');
        el.id = 'login-err';
        el.style.cssText = 'color:#dc2626;font-size:13px;text-align:center;margin-top:12px;animation:fadeIn .2s;';
        el.textContent = msg;
        document.querySelector('.wrap').appendChild(el);
    }
    function clearError() { document.getElementById('login-err')?.remove(); }

    // Enter to submit
    [usernameEl, passwordEl].forEach(el =>
        el.addEventListener('keydown', e => { if (e.key === 'Enter') btnLogin.click(); })
    );
</script>
</body>
</html>
