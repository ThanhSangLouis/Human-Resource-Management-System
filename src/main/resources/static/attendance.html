<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance — HRM System</title>
    <style>
        :root {
            --blue-50:  #eff6ff;
            --blue-100: #dbeafe;
            --blue-200: #bfdbfe;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --blue-800: #1e40af;
            --blue-900: #1e3a8a;
            --slate-50:  #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --green-100: #dcfce7;
            --green-600: #16a34a;
            --green-700: #15803d;
            --red-100:   #fee2e2;
            --red-600:   #dc2626;
            --amber-100: #fef3c7;
            --amber-600: #d97706;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", system-ui, Arial, sans-serif;
            background: linear-gradient(135deg, var(--blue-900) 0%, var(--slate-900) 100%);
            min-height: 100vh;
            color: var(--slate-800);
            padding: 24px 16px;
        }

        /* ── Top nav bar ── */
        .topbar {
            max-width: 900px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo {
            width: 38px; height: 38px;
            background: var(--blue-600);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .site-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: .5px;
        }
        .site-name span { color: var(--blue-200); }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #userBadge {
            font-size: 13px;
            color: var(--blue-200);
            background: rgba(255,255,255,.08);
            padding: 5px 12px;
            border-radius: 20px;
            display: none;
        }
        .btn-sm {
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background .2s;
        }
        #btnLogout {
            background: rgba(255,255,255,.12);
            color: var(--white);
            display: none;
        }
        #btnLogout:hover { background: rgba(255,255,255,.22); }

        /* ── Main card ── */
        .card {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0,0,0,.3);
            overflow: hidden;
        }

        /* ── Card header ── */
        .card-header {
            background: linear-gradient(135deg, var(--blue-600), var(--blue-800));
            padding: 28px 32px;
            color: var(--white);
        }
        .card-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card-header p {
            font-size: 14px;
            opacity: .8;
        }
        #liveTime {
            font-size: 28px;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 2px;
        }
        #liveDate {
            font-size: 13px;
            opacity: .75;
            margin-top: 2px;
        }

        /* ── Card body ── */
        .card-body {
            padding: 28px 32px;
        }

        /* ── Login section ── */
        #loginSection { display: block; }
        #attendanceSection { display: none; }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--slate-700);
            margin-bottom: 14px;
        }

        .field { margin-bottom: 14px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--slate-700);
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid var(--slate-200);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            background: var(--slate-50);
        }
        input:focus {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 3px rgba(59,130,246,.15);
            background: var(--white);
        }

        /* ── Buttons ── */
        .btn-primary {
            background: var(--blue-600);
            color: var(--white);
            border: none;
            border-radius: 10px;
            padding: 11px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
        }
        .btn-primary:hover { background: var(--blue-700); }
        .btn-primary:active { transform: translateY(1px); }
        .btn-primary:disabled {
            background: var(--slate-400);
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: var(--red-600);
            color: var(--white);
            border: none;
            border-radius: 10px;
            padding: 11px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-danger:hover { background: #b91c1c; }
        .btn-danger:disabled {
            background: var(--slate-400);
            cursor: not-allowed;
        }

        #btnLogin { width: 100%; margin-top: 4px; }

        /* ── Action row ── */
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }
        .action-card {
            border: 1.5px solid var(--blue-100);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            background: var(--blue-50);
        }
        .action-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .action-card .label {
            font-size: 13px;
            color: var(--slate-500);
            margin-bottom: 12px;
        }
        .action-card .btn-primary,
        .action-card .btn-danger { width: 100%; }

        /* ── Status panel ── */
        .status-panel {
            background: var(--blue-50);
            border: 1.5px solid var(--blue-100);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-panel .panel-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--blue-700);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-item {
            background: var(--white);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--blue-200);
        }
        .stat-item .val {
            font-size: 18px;
            font-weight: 700;
            color: var(--blue-700);
        }
        .stat-item .lbl {
            font-size: 11px;
            color: var(--slate-500);
            margin-top: 2px;
        }

        /* ── Badge ── */
        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .badge-present  { background: var(--green-100); color: var(--green-700); }
        .badge-late     { background: var(--amber-100); color: var(--amber-600); }
        .badge-absent   { background: var(--red-100);   color: var(--red-600); }
        .badge-halfday  { background: var(--blue-100);  color: var(--blue-700); }
        .badge-none     { background: var(--slate-100); color: var(--slate-500); }

        /* ── Toast notification ── */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--slate-800);
            color: var(--white);
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
            transition: transform .3s ease;
            z-index: 999;
            max-width: 360px;
            text-align: center;
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.toast-ok  { background: var(--green-600); }
        #toast.toast-err { background: var(--red-600); }

        /* ── Note field ── */
        .note-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .note-row .field { flex: 1; margin-bottom: 0; }

        /* ── Responsive ── */
        @media (max-width: 540px) {
            .card-body { padding: 20px 18px; }
            .card-header { padding: 22px 18px; }
            .action-row { grid-template-columns: 1fr; }
            .stat-grid  { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- Top navigation -->
<div class="topbar">
    <div class="topbar-left">
        <div class="logo">🏢</div>
        <span class="site-name">HRM <span>System</span></span>
    </div>
    <div class="topbar-right">
        <span id="userBadge"></span>
        <button id="btnLogout" class="btn-sm">Sign out</button>
    </div>
</div>

<!-- Main card -->
<div class="card">
    <!-- Header with live clock -->
    <div class="card-header">
        <h1>Attendance Tracker</h1>
        <p>Track your daily check-in and check-out time</p>
        <div id="liveTime">00:00:00</div>
        <div id="liveDate">Loading...</div>
    </div>

    <div class="card-body">

        <!-- ══ LOGIN SECTION ══ -->
        <div id="loginSection">
            <p class="section-title">Sign in to record your attendance</p>
            <div class="field">
                <label for="loginUser">Username</label>
                <input id="loginUser" type="text" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="field">
                <label for="loginPass">Password</label>
                <input id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password">
            </div>
            <button id="btnLogin" class="btn-primary">Sign In</button>
        </div>

        <!-- ══ ATTENDANCE SECTION ══ -->
        <div id="attendanceSection">

            <!-- Today status panel -->
            <div class="status-panel">
                <div class="panel-title">📋 Today's Summary
                    <span id="statusBadge" class="badge badge-none">—</span>
                </div>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="val" id="statCheckIn">—</div>
                        <div class="lbl">Check-in</div>
                    </div>
                    <div class="stat-item">
                        <div class="val" id="statCheckOut">—</div>
                        <div class="lbl">Check-out</div>
                    </div>
                    <div class="stat-item">
                        <div class="val" id="statHours">0h</div>
                        <div class="lbl">Hours worked</div>
                    </div>
                </div>
            </div>

            <!-- Optional note -->
            <div class="note-row">
                <div class="field">
                    <label for="noteInput">Note <span style="color:var(--slate-400);font-weight:400">(optional)</span></label>
                    <input id="noteInput" type="text" placeholder="e.g. Working from home, late due to traffic...">
                </div>
            </div>

            <!-- Check-in / Check-out actions -->
            <div class="action-row">
                <div class="action-card">
                    <div class="icon">🟢</div>
                    <div class="label">Record your arrival time</div>
                    <button id="btnCheckIn" class="btn-primary">Check In</button>
                </div>
                <div class="action-card">
                    <div class="icon">🔴</div>
                    <div class="label">Record your departure time</div>
                    <button id="btnCheckOut" class="btn-danger">Check Out</button>
                </div>
            </div>

        </div><!-- /attendanceSection -->
    </div><!-- /card-body -->
</div><!-- /card -->

<!-- Toast -->
<div id="toast"></div>

<script>
    // ── Constants ──
    const TOKEN_KEY = "hrm_access_token";
    const DAYS  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const MONTHS= ["January","February","March","April","May","June","July","August","September","October","November","December"];

    // ── DOM refs ──
    const loginSection     = document.getElementById("loginSection");
    const attendanceSection= document.getElementById("attendanceSection");
    const loginUser        = document.getElementById("loginUser");
    const loginPass        = document.getElementById("loginPass");
    const btnLogin         = document.getElementById("btnLogin");
    const btnLogout        = document.getElementById("btnLogout");
    const userBadge        = document.getElementById("userBadge");
    const btnCheckIn       = document.getElementById("btnCheckIn");
    const btnCheckOut      = document.getElementById("btnCheckOut");
    const noteInput        = document.getElementById("noteInput");
    const statusBadge      = document.getElementById("statusBadge");
    const statCheckIn      = document.getElementById("statCheckIn");
    const statCheckOut     = document.getElementById("statCheckOut");
    const statHours        = document.getElementById("statHours");
    const liveTime         = document.getElementById("liveTime");
    const liveDate         = document.getElementById("liveDate");
    const toast            = document.getElementById("toast");

    // ── Live clock ──
    function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const ss = String(now.getSeconds()).padStart(2, "0");
        liveTime.textContent = `${hh}:${mm}:${ss}`;
        liveDate.textContent = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Toast ──
    let toastTimer;
    function showToast(msg, type = "ok") {
        clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.className = `show toast-${type}`;
        toastTimer = setTimeout(() => { toast.className = ""; }, 3500);
    }

    // ── Helpers ──
    function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }

    async function apiFetch(url, options = {}) {
        const token = getToken();
        const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
        if (token) headers["Authorization"] = "Bearer " + token;
        const res = await fetch(url, { ...options, headers, credentials: "include" });
        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        return { ok: res.ok, status: res.status, data };
    }

    // ── Format time from ISO ──
    function fmtTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        const h = String(d.getHours()).padStart(2, "0");
        const m = String(d.getMinutes()).padStart(2, "0");
        return `${h}:${m}`;
    }

    function fmtHours(num) {
        if (!num && num !== 0) return "0h";
        const val = parseFloat(num);
        const h = Math.floor(val);
        const m = Math.round((val - h) * 60);
        return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    function renderStatus(data) {
        // Status badge
        const s = data.status;
        let badgeClass = "badge-none", badgeText = "No Record";
        if (s === "PRESENT")   { badgeClass = "badge-present"; badgeText = "Present"; }
        else if (s === "LATE") { badgeClass = "badge-late";    badgeText = "Late"; }
        else if (s === "ABSENT") { badgeClass = "badge-absent"; badgeText = "Absent"; }
        else if (s === "HALF_DAY") { badgeClass = "badge-halfday"; badgeText = "Half Day"; }
        else if (s === "ON_LEAVE") { badgeClass = "badge-halfday"; badgeText = "On Leave"; }

        statusBadge.className = `badge ${badgeClass}`;
        statusBadge.textContent = badgeText;

        statCheckIn.textContent  = fmtTime(data.checkIn);
        statCheckOut.textContent = fmtTime(data.checkOut);
        statHours.textContent    = fmtHours(data.workHours);

        // Disable buttons based on state
        btnCheckIn.disabled  = !!data.checkIn;
        btnCheckOut.disabled = !data.checkIn || !!data.checkOut;
    }

    // ── Load today's attendance ──
    async function loadToday() {
        const { ok, data } = await apiFetch("/api/attendance/today");
        if (ok) renderStatus(data);
    }

    // ── Show/hide sections ──
    function showAttendance(username) {
        loginSection.style.display    = "none";
        attendanceSection.style.display = "block";
        userBadge.style.display = "inline";
        userBadge.textContent   = "👤 " + username;
        btnLogout.style.display = "inline";
        loadToday();
    }

    function showLogin() {
        loginSection.style.display      = "block";
        attendanceSection.style.display = "none";
        userBadge.style.display = "none";
        btnLogout.style.display = "none";
        loginPass.value = "";
    }

    // ── On page load: check token ──
    (function init() {
        const token = getToken();
        if (!token) { showLogin(); return; }
        // Try to decode username from JWT payload
        try {
            const payload = JSON.parse(atob(token.split(".")[1]));
            const username = payload.sub || "User";
            const expiry = payload.exp * 1000;
            if (Date.now() >= expiry) {
                localStorage.removeItem(TOKEN_KEY);
                showLogin();
            } else {
                showAttendance(username);
            }
        } catch (e) {
            showLogin();
        }
    })();

    // ── Login ──
    btnLogin.addEventListener("click", async () => {
        const u = loginUser.value.trim();
        const p = loginPass.value;
        if (!u || !p) { showToast("Please enter username and password", "err"); return; }

        btnLogin.disabled = true;
        btnLogin.textContent = "Signing in...";

        const { ok, data } = await apiFetch("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({ username: u, password: p })
        });

        btnLogin.disabled = false;
        btnLogin.textContent = "Sign In";

        if (!ok) {
            showToast(data.message || "Login failed", "err");
            return;
        }

        const token = data.accessToken || "";
        if (!token) { showToast("Login error: no token received", "err"); return; }

        localStorage.setItem(TOKEN_KEY, token);
        showToast("Welcome, " + (data.username || u) + "!", "ok");
        showAttendance(data.username || u);
    });

    loginPass.addEventListener("keydown", e => { if (e.key === "Enter") btnLogin.click(); });

    // ── Logout ──
    btnLogout.addEventListener("click", async () => {
        await apiFetch("/api/auth/logout", { method: "POST" });
        localStorage.removeItem(TOKEN_KEY);
        showToast("Signed out successfully", "ok");
        showLogin();
    });

    // ── Check-in ──
    btnCheckIn.addEventListener("click", async () => {
        btnCheckIn.disabled = true;
        btnCheckIn.textContent = "Checking in...";

        const note = noteInput.value.trim();
        const url  = "/api/attendance/check-in" + (note ? `?note=${encodeURIComponent(note)}` : "");

        const { ok, data } = await apiFetch(url, { method: "POST" });

        btnCheckIn.textContent = "Check In";
        if (!ok) {
            showToast(data.message || "Check-in failed", "err");
            btnCheckIn.disabled = false;
            return;
        }

        noteInput.value = "";
        showToast(data.message || "Checked in successfully!", "ok");
        renderStatus(data);
    });

    // ── Check-out ──
    btnCheckOut.addEventListener("click", async () => {
        btnCheckOut.disabled = true;
        btnCheckOut.textContent = "Checking out...";

        const note = noteInput.value.trim();
        const url  = "/api/attendance/check-out" + (note ? `?note=${encodeURIComponent(note)}` : "");

        const { ok, data } = await apiFetch(url, { method: "POST" });

        btnCheckOut.textContent = "Check Out";
        if (!ok) {
            showToast(data.message || "Check-out failed", "err");
            btnCheckOut.disabled = false;
            return;
        }

        noteInput.value = "";
        showToast(data.message || "Checked out successfully!", "ok");
        renderStatus(data);
    });
</script>
</body>
</html>
